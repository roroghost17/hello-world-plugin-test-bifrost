name: Build and release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build plugin (linux/${{ matrix.goarch }})
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p build
          docker run --rm \
            --platform linux/amd64 \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            -e CGO_ENABLED=1 \
            -e GOOS=linux \
            -e GOARCH=amd64 \
            golang:1.26.1-bookworm \
            sh -c "apt-get update && apt-get install -y gcc && \
              go build -buildmode=plugin -ldflags='-w -s' -trimpath -o build/hello-world-plugin-${{ matrix.goarch }}.so main.go"

      - name: Upload artifact (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: plugin-linux-${{ matrix.goarch }}
          path: hello-world-plugin-linux-${{ matrix.goarch }}.so

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: plugin-linux-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
